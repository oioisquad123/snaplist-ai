<!DOCTYPE html>
<!-- 
  OG Image Generator — open in Chrome, screenshot at 1200x630
  Save as og-image.png in /public
-->
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  width: 1200px; height: 630px; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e40af 0%, #2563eb 40%, #3b82f6 100%);
  display: flex; align-items: center; justify-content: center;
}
.container {
  width: 100%; height: 100%; padding: 60px 80px;
  display: flex; flex-direction: column; justify-content: center;
  position: relative; overflow: hidden;
}
.badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.15); border-radius: 40px;
  padding: 8px 20px; font-size: 18px; color: white; 
  font-weight: 600; margin-bottom: 24px; width: fit-content;
}
h1 {
  font-size: 72px; font-weight: 800; color: white;
  line-height: 1.1; margin-bottom: 24px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.2);
}
h1 span { color: #fbbf24; }
.sub {
  font-size: 28px; color: rgba(255,255,255,0.85);
  font-weight: 500; margin-bottom: 40px;
}
.pills { display: flex; gap: 16px; }
.pill {
  background: rgba(255,255,255,0.2); border-radius: 12px;
  padding: 12px 24px; font-size: 20px; color: white; font-weight: 600;
}
.bg-circle {
  position: absolute; border-radius: 50%; 
  background: rgba(255,255,255,0.05);
}
</style>
</head>
<body>
<div class="container">
  <div class="bg-circle" style="width:500px;height:500px;right:-100px;bottom:-200px"></div>
  <div class="bg-circle" style="width:300px;height:300px;right:300px;top:-100px"></div>
  <div class="badge">📸 SnapList AI</div>
  <h1>Photos → eBay Listing<br>in <span>10 Seconds</span></h1>
  <p class="sub">AI writes title, price, description, item specifics.<br>eBay + Poshmark. Free to try.</p>
  <div class="pills">
    <div class="pill">⚡ Instant AI</div>
    <div class="pill">🛒 eBay Ready</div>
    <div class="pill">👗 Poshmark Ready</div>
    <div class="pill">🆓 3/day Free</div>
  </div>
</div>
</body>
</html>
